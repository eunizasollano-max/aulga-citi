<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Admin | Aulga Citi</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='4' y='4' width='92' height='92' rx='16' fill='%23ffffff' stroke='%23111827' stroke-width='8'/%3E%3Cpolygon points='16,84 30,52 44,84' fill='%235aa9d8'/%3E%3Cpolygon points='38,84 48,30 58,84' fill='%23f2ce4e'/%3E%3Crect x='41' y='55' width='10' height='29' fill='%23b8403f'/%3E%3Cpolygon points='41,55 46,44 51,55' fill='%23b8403f'/%3E%3Cpolygon points='55,86 62,54 69,66 76,54 83,86' fill='%235aa9d8'/%3E%3Crect x='71' y='58' width='16' height='30' fill='%234f9d95'/%3E%3Crect x='75' y='65' width='4' height='4' fill='%23ffffff'/%3E%3Crect x='75' y='73' width='4' height='4' fill='%23ffffff'/%3E%3Crect x='75' y='81' width='4' height='4' fill='%23ffffff'/%3E%3Crect x='82' y='65' width='3' height='3' fill='%238c2f36'/%3E%3Crect x='82' y='72' width='3' height='3' fill='%238c2f36'/%3E%3C/svg%3E">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['Poppins', 'sans-serif'],
          body: ['Inter', 'sans-serif'],
        },
        colors: { amber: { 600: '#d97706' } }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, .font-display { font-family: 'Poppins', sans-serif; }
</style>
</head>
<body class="bg-slate-950 text-slate-300 antialiased min-h-screen">

  <header class="border-b border-slate-800">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="font-display font-extrabold text-lg tracking-tight text-white">
        AULGA <span class="text-amber-500">CITI</span> <span class="text-slate-500 font-medium text-sm">/ Admin</span>
      </a>
      <button id="logoutBtn" class="hidden text-sm font-medium text-slate-400 hover:text-amber-500 transition">Log out</button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-14">

    <!-- Login -->
    <div id="loginView" class="max-w-sm mx-auto bg-slate-900 rounded-2xl border border-slate-800 p-8">
      <h1 class="font-display font-bold text-xl text-white mb-6 text-center">Admin Log In</h1>

      <div class="flex gap-2 mb-6">
        <button id="loginTabEmail" type="button" class="login-tab-btn flex-1 px-4 py-2 rounded-full text-xs font-semibold border transition">Email &amp; Password</button>
        <button id="loginTabCode" type="button" class="login-tab-btn flex-1 px-4 py-2 rounded-full text-xs font-semibold border transition">Quick Code</button>
      </div>

      <form id="loginForm" class="space-y-4">
        <div>
          <label for="loginEmail" class="block text-sm font-semibold text-slate-300 mb-1.5">Email</label>
          <input id="loginEmail" type="email" required class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>
        <div>
          <label for="loginPassword" class="block text-sm font-semibold text-slate-300 mb-1.5">Password</label>
          <input id="loginPassword" type="password" required class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>
        <p id="loginError" class="hidden text-sm text-red-400"></p>
        <button type="submit" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-semibold py-2.5 rounded-full transition">Log In</button>
      </form>

      <form id="codeLoginForm" class="hidden space-y-4">
        <div>
          <label for="loginCode" class="block text-sm font-semibold text-slate-300 mb-1.5">Code</label>
          <input id="loginCode" type="password" inputmode="numeric" pattern="[0-9]*" required placeholder="6-digit code" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white placeholder-slate-500 px-4 py-2.5 text-sm text-center tracking-[0.3em] focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>
        <p id="codeLoginError" class="hidden text-sm text-red-400"></p>
        <button type="submit" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-semibold py-2.5 rounded-full transition">Log In</button>
      </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboardView" class="hidden">
      <div class="flex items-center gap-2 mb-8">
        <button id="tabBookings" class="main-tab-btn px-5 py-2.5 rounded-full text-sm font-semibold border transition">Bookings</button>
        <button id="tabWaivers" class="main-tab-btn px-5 py-2.5 rounded-full text-sm font-semibold border transition">Waivers</button>
      </div>

      <!-- Bookings panel -->
      <div id="bookingsPanel">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
          <h1 class="font-display font-bold text-2xl text-white">Booking Requests</h1>
          <div class="flex flex-wrap items-center gap-2">
            <button data-filter="pending" class="filter-btn px-4 py-2 rounded-full text-xs font-semibold border transition">Pending</button>
            <button data-filter="confirmed" class="filter-btn px-4 py-2 rounded-full text-xs font-semibold border transition">Confirmed</button>
            <button data-filter="rejected" class="filter-btn px-4 py-2 rounded-full text-xs font-semibold border transition">Rejected</button>
            <button data-filter="all" class="filter-btn px-4 py-2 rounded-full text-xs font-semibold border transition">All</button>
            <button id="openAddBooking" class="bg-amber-600 hover:bg-amber-500 text-white text-xs font-semibold px-4 py-2 rounded-full transition ml-2">+ Add Booking</button>
          </div>
        </div>

        <p id="listError" class="hidden text-sm text-red-400 mb-4"></p>
        <p id="listEmpty" class="hidden text-sm text-slate-500">No bookings in this view.</p>
        <div id="bookingList" class="space-y-4"></div>
      </div>

      <!-- Waivers panel -->
      <div id="waiversPanel" class="hidden">
        <h1 class="font-display font-bold text-2xl text-white mb-8">Signed Waivers</h1>
        <p id="waiversError" class="hidden text-sm text-red-400 mb-4"></p>
        <p id="waiversEmpty" class="hidden text-sm text-slate-500">No waivers submitted yet.</p>
        <div id="waiversList" class="space-y-4"></div>
      </div>
    </div>
  </main>

  <!-- Add Booking modal -->
  <div id="addBookingModal" class="hidden fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4 overflow-y-auto">
    <div class="bg-slate-900 rounded-2xl border border-slate-800 p-7 w-full max-w-md my-8">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-display font-semibold text-lg text-white">Add a manual booking</h2>
        <button id="closeAddBooking" aria-label="Close" class="text-slate-400 hover:text-white transition">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <p class="text-xs text-slate-500 mb-5">For phone calls, walk-ins, or anyone who booked outside the website.</p>

      <form id="addBookingForm" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-300 mb-1.5">Venue</label>
          <select id="mVenue" style="color-scheme: dark;" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
            <option value="event_center">Aulga Citi Event Center</option>
            <option value="sports">Aulga Citi Sports</option>
          </select>
        </div>

        <div id="mSportsFields" class="hidden space-y-4">
          <div>
            <label class="block text-sm font-semibold text-slate-300 mb-1.5">Court</label>
            <select id="mCourtType" style="color-scheme: dark;" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
              <option value="full">Full Court</option>
              <option value="half">Half Court</option>
              <option value="event">Event</option>
            </select>
          </div>
          <div id="mSportTypeField" class="hidden">
            <label class="block text-sm font-semibold text-slate-300 mb-1.5">Sport</label>
            <select id="mSportType" style="color-scheme: dark;" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
              <option value="pickleball">Pickleball</option>
              <option value="badminton">Badminton</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="mDate" class="block text-sm font-semibold text-slate-300 mb-1.5">Date</label>
            <input id="mDate" type="date" required style="color-scheme: dark;" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
          </div>
          <div>
            <label for="mStartTime" class="block text-sm font-semibold text-slate-300 mb-1.5">Start time</label>
            <input id="mStartTime" type="time" required style="color-scheme: dark;" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="mDuration" class="block text-sm font-semibold text-slate-300 mb-1.5">Duration (hrs)</label>
            <input id="mDuration" type="number" min="1" max="12" step="1" value="4" required class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
          </div>
          <div id="mGuestField">
            <label for="mGuestCount" class="block text-sm font-semibold text-slate-300 mb-1.5">Guests</label>
            <input id="mGuestCount" type="number" min="1" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
          </div>
        </div>

        <div>
          <label for="mName" class="block text-sm font-semibold text-slate-300 mb-1.5">Name</label>
          <input id="mName" type="text" required placeholder="Guest's full name" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white placeholder-slate-500 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="mEmail" class="block text-sm font-semibold text-slate-300 mb-1.5">Email</label>
            <input id="mEmail" type="text" required placeholder="or type 'walk-in'" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white placeholder-slate-500 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
          </div>
          <div>
            <label for="mPhone" class="block text-sm font-semibold text-slate-300 mb-1.5">Phone</label>
            <input id="mPhone" type="tel" placeholder="09XX XXX XXXX" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white placeholder-slate-500 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
          </div>
        </div>

        <div>
          <label for="mMessage" class="block text-sm font-semibold text-slate-300 mb-1.5">Notes</label>
          <textarea id="mMessage" rows="2" placeholder="Optional" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white placeholder-slate-500 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
        </div>

        <div>
          <label for="mStatus" class="block text-sm font-semibold text-slate-300 mb-1.5">Status</label>
          <select id="mStatus" style="color-scheme: dark;" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
            <option value="confirmed">Confirmed — blocks this date/time now</option>
            <option value="pending">Pending — needs review first</option>
          </select>
        </div>

        <p id="addBookingError" class="hidden text-sm text-red-400"></p>

        <button type="submit" id="addBookingSubmit" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-semibold py-2.5 rounded-full transition">
          Add Booking
        </button>
      </form>
    </div>
  </div>

  <script src="js/supabase-client.js"></script>
  <script>
    const highlightId = new URLSearchParams(window.location.search).get('id');
    let currentFilter = highlightId ? 'all' : 'pending';
    let allBookings = [];
    let allWaivers = [];
    let waiversLoaded = false;

    const loginView = document.getElementById('loginView');
    const dashboardView = document.getElementById('dashboardView');
    const logoutBtn = document.getElementById('logoutBtn');

    // Escapes free-text fields (name, email, message, etc.) before they're
    // interpolated into innerHTML — without this, a booking/waiver submitted
    // with HTML in a text field would execute inside this logged-in admin
    // session the moment the list renders.
    function escapeHtml(value) {
      if (value == null) return '';
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function statusBadge(status) {
      const map = {
        pending: 'bg-amber-500/10 text-amber-400 border-amber-500/30',
        confirmed: 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30',
        rejected: 'bg-red-500/10 text-red-400 border-red-500/30',
      };
      return `<span class="text-xs font-semibold px-2.5 py-1 rounded-full border ${map[status]}">${status}</span>`;
    }

    function renderList() {
      const listEl = document.getElementById('bookingList');
      const emptyEl = document.getElementById('listEmpty');
      const rows = currentFilter === 'all'
        ? allBookings
        : allBookings.filter(b => b.status === currentFilter);

      document.querySelectorAll('.filter-btn').forEach(btn => {
        const active = btn.dataset.filter === currentFilter;
        btn.className = 'filter-btn px-4 py-2 rounded-full text-xs font-semibold border transition ' +
          (active ? 'bg-amber-600 border-amber-600 text-white' : 'bg-slate-900 border-slate-700 text-slate-300 hover:border-amber-500/40');
      });

      if (rows.length === 0) {
        listEl.innerHTML = '';
        emptyEl.classList.remove('hidden');
        return;
      }
      emptyEl.classList.add('hidden');

      listEl.innerHTML = rows.map(b => {
        const venueLabel = b.venue === 'sports' ? 'Aulga Citi Sports' : 'Aulga Citi Event Center';
        let court = '';
        if (b.court_type === 'event') court = ' &middot; Event';
        else if (b.court_type) court = ` &middot; ${b.court_type} court${b.sport_type ? ` (${b.sport_type})` : ''}`;
        const dateLabel = new Date(b.booking_date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        const actions = b.status === 'pending'
          ? `<button data-id="${b.id}" data-action="confirmed" class="action-btn bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold px-4 py-2 rounded-full transition">Approve</button>
             <button data-id="${b.id}" data-action="rejected" class="action-btn bg-slate-800 hover:bg-red-600 text-white text-xs font-semibold px-4 py-2 rounded-full transition">Reject</button>`
          : `<button data-id="${b.id}" data-action="pending" class="action-btn bg-slate-800 hover:bg-slate-700 text-white text-xs font-semibold px-4 py-2 rounded-full transition">Reset to pending</button>`;

        const highlighted = b.id === highlightId;

        return `
          <div class="bg-slate-900 rounded-2xl border ${highlighted ? 'border-amber-500 ring-2 ring-amber-500/40' : 'border-slate-800'} p-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4" data-row="${b.id}">
            <div>
              <div class="flex items-center gap-2 mb-2">
                <p class="font-display font-semibold text-white">${venueLabel}${court}</p>
                ${statusBadge(b.status)}
              </div>
              <p class="text-sm text-slate-300">${dateLabel} &middot; ${b.start_time.slice(0,5)} &middot; ${b.duration_hours}hr${b.guest_count ? ` &middot; ${escapeHtml(b.guest_count)} guests` : ''}</p>
              <p class="text-sm text-slate-400 mt-1">${escapeHtml(b.name)} &middot; <a href="mailto:${encodeURIComponent(b.email)}" class="hover:text-amber-400">${escapeHtml(b.email)}</a>${b.phone ? ` &middot; ${escapeHtml(b.phone)}` : ''}</p>
              ${b.message ? `<p class="text-xs text-slate-500 mt-2">${escapeHtml(b.message)}</p>` : ''}
              <p class="text-xs text-slate-600 mt-2">Requested ${new Date(b.created_at).toLocaleString()}</p>
            </div>
            <div class="flex gap-2 shrink-0">${actions}</div>
          </div>`;
      }).join('');

      document.querySelectorAll('.action-btn').forEach(btn => {
        btn.addEventListener('click', () => updateStatus(btn.dataset.id, btn.dataset.action));
      });

      if (highlightId) {
        const row = listEl.querySelector(`[data-row="${highlightId}"]`);
        if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    function notifyCustomer(booking, status) {
      if (!BOOKING_NOTIFY_URL || BOOKING_NOTIFY_URL.startsWith('YOUR_')) return;
      const payload = { ...booking, status, type: 'status_update' };
      // text/plain avoids a CORS preflight the Apps Script web app doesn't handle.
      fetch(BOOKING_NOTIFY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload),
      }).catch(err => console.error('Customer notification failed:', err));
    }

    async function updateStatus(id, status) {
      const booking = allBookings.find(b => b.id === id);
      try {
        const { error } = await supabaseClient.from('bookings').update({ status }).eq('id', id);
        if (error) throw error;
        if (booking && (status === 'confirmed' || status === 'rejected')) {
          notifyCustomer(booking, status);
        }
        await loadBookings();
      } catch (err) {
        console.error(err);
        alert(status === 'confirmed'
          ? 'Could not confirm — this overlaps a booking that\'s already confirmed for this venue.'
          : 'Something went wrong updating this booking.');
      }
    }

    async function loadBookings() {
      const errorEl = document.getElementById('listError');
      errorEl.classList.add('hidden');
      try {
        const { data, error } = await supabaseClient
          .from('bookings')
          .select('*')
          .order('status', { ascending: true })
          .order('booking_date', { ascending: true });
        if (error) throw error;
        allBookings = data || [];
        renderList();
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not load bookings.';
        errorEl.classList.remove('hidden');
      }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { currentFilter = btn.dataset.filter; renderList(); });
    });

    function setMainTab(tab) {
      const isBookings = tab === 'bookings';
      document.getElementById('bookingsPanel').classList.toggle('hidden', !isBookings);
      document.getElementById('waiversPanel').classList.toggle('hidden', isBookings);
      document.getElementById('tabBookings').className = 'main-tab-btn px-5 py-2.5 rounded-full text-sm font-semibold border transition ' +
        (isBookings ? 'bg-amber-600 border-amber-600 text-white' : 'bg-slate-900 border-slate-700 text-slate-300 hover:border-amber-500/40');
      document.getElementById('tabWaivers').className = 'main-tab-btn px-5 py-2.5 rounded-full text-sm font-semibold border transition ' +
        (!isBookings ? 'bg-amber-600 border-amber-600 text-white' : 'bg-slate-900 border-slate-700 text-slate-300 hover:border-amber-500/40');
      if (!isBookings) loadWaivers();
    }

    document.getElementById('tabBookings').addEventListener('click', () => setMainTab('bookings'));
    document.getElementById('tabWaivers').addEventListener('click', () => setMainTab('waivers'));

    function bookingLabelFor(bookingId) {
      const booking = allBookings.find(b => b.id === bookingId);
      if (!booking) return 'No linked booking';
      const venueLabel = booking.venue === 'sports' ? 'Aulga Citi Sports' : 'Aulga Citi Event Center';
      const dateLabel = new Date(booking.booking_date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      return `${venueLabel} — ${dateLabel} at ${booking.start_time.slice(0, 5)}`;
    }

    function renderWaiversList() {
      const listEl = document.getElementById('waiversList');
      const emptyEl = document.getElementById('waiversEmpty');

      if (allWaivers.length === 0) {
        listEl.innerHTML = '';
        emptyEl.classList.remove('hidden');
        return;
      }
      emptyEl.classList.add('hidden');

      listEl.innerHTML = allWaivers.map(w => {
        const members = (w.member_names || [])
          .map(n => `<span class="inline-block bg-slate-800 border border-slate-700 rounded-full px-3 py-1 text-xs text-slate-300 mr-1.5 mb-1.5">${escapeHtml(n)}</span>`)
          .join('');
        return `
          <div class="bg-slate-900 rounded-2xl border border-slate-800 p-6">
            <div class="flex flex-wrap items-center justify-between gap-2 mb-2">
              <p class="font-display font-semibold text-white">${escapeHtml(w.lead_name)}</p>
              <p class="text-xs text-slate-500">${new Date(w.created_at).toLocaleString()}</p>
            </div>
            <p class="text-sm text-slate-400 mb-3">${bookingLabelFor(w.booking_id)}${w.lead_email ? ` &middot; <a href="mailto:${encodeURIComponent(w.lead_email)}" class="hover:text-amber-400">${escapeHtml(w.lead_email)}</a>` : ''}</p>
            <p class="text-xs uppercase tracking-wide text-slate-500 mb-1.5">Members (${(w.member_names || []).length})</p>
            <div class="mb-3">${members}</div>
            <p class="text-xs text-slate-500">Signature: <span class="font-display italic text-slate-300">${escapeHtml(w.signature)}</span></p>
          </div>`;
      }).join('');
    }

    async function loadWaivers() {
      const errorEl = document.getElementById('waiversError');
      errorEl.classList.add('hidden');
      try {
        const { data, error } = await supabaseClient
          .from('waivers')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) throw error;
        allWaivers = data || [];
        waiversLoaded = true;
        renderWaiversList();
      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Could not load waivers.';
        errorEl.classList.remove('hidden');
      }
    }

    const addBookingModal = document.getElementById('addBookingModal');
    const addBookingForm = document.getElementById('addBookingForm');
    const addBookingError = document.getElementById('addBookingError');

    function updateManualSubfields() {
      const isSports = document.getElementById('mVenue').value === 'sports';
      const courtType = document.getElementById('mCourtType').value;
      document.getElementById('mSportsFields').classList.toggle('hidden', !isSports);
      document.getElementById('mSportTypeField').classList.toggle('hidden', !(isSports && courtType === 'half'));
      document.getElementById('mGuestField').classList.toggle('hidden', isSports && courtType !== 'event');
      document.getElementById('mDuration').value = isSports ? 1 : 4;
    }

    document.getElementById('mVenue').addEventListener('change', updateManualSubfields);
    document.getElementById('mCourtType').addEventListener('change', updateManualSubfields);

    function openAddBookingModal() {
      addBookingForm.reset();
      document.getElementById('mVenue').value = 'event_center';
      updateManualSubfields();
      addBookingError.classList.add('hidden');
      addBookingModal.classList.remove('hidden');
    }
    function closeAddBookingModal() {
      addBookingModal.classList.add('hidden');
    }

    document.getElementById('openAddBooking').addEventListener('click', openAddBookingModal);
    document.getElementById('closeAddBooking').addEventListener('click', closeAddBookingModal);
    addBookingModal.addEventListener('click', (e) => {
      if (e.target === addBookingModal) closeAddBookingModal();
    });

    addBookingForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      addBookingError.classList.add('hidden');

      const submitBtn = document.getElementById('addBookingSubmit');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Adding…';

      const isSports = document.getElementById('mVenue').value === 'sports';
      const courtType = isSports ? document.getElementById('mCourtType').value : null;
      const showsGuestCount = !isSports || courtType === 'event';

      const payload = {
        venue: document.getElementById('mVenue').value,
        court_type: courtType,
        sport_type: courtType === 'half' ? document.getElementById('mSportType').value : null,
        booking_date: document.getElementById('mDate').value,
        start_time: document.getElementById('mStartTime').value,
        duration_hours: Number(document.getElementById('mDuration').value),
        name: document.getElementById('mName').value.trim(),
        email: document.getElementById('mEmail').value.trim(),
        phone: document.getElementById('mPhone').value.trim() || null,
        guest_count: showsGuestCount && document.getElementById('mGuestCount').value
          ? Number(document.getElementById('mGuestCount').value) : null,
        message: document.getElementById('mMessage').value.trim() || null,
        status: document.getElementById('mStatus').value,
      };

      try {
        const { error } = await supabaseClient.from('bookings').insert(payload);
        if (error) throw error;
        closeAddBookingModal();
        currentFilter = payload.status;
        await loadBookings();
      } catch (err) {
        console.error(err);
        addBookingError.textContent = payload.status === 'confirmed'
          ? 'Could not add — this overlaps a booking that\'s already confirmed for this venue.'
          : 'Something went wrong adding this booking.';
        addBookingError.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Add Booking';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('loginError');
      errorEl.classList.add('hidden');
      const { error } = await supabaseClient.auth.signInWithPassword({
        email: document.getElementById('loginEmail').value.trim(),
        password: document.getElementById('loginPassword').value,
      });
      if (error) {
        errorEl.textContent = 'Invalid email or password.';
        errorEl.classList.remove('hidden');
        return;
      }
      showDashboard();
    });

    // Dedicated account whose password is the quick-access numeric code —
    // lets someone log in without typing the real admin email/password.
    const QUICK_CODE_EMAIL = 'quickcode@aulgaciti.local';

    document.getElementById('codeLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('codeLoginError');
      errorEl.classList.add('hidden');
      const { error } = await supabaseClient.auth.signInWithPassword({
        email: QUICK_CODE_EMAIL,
        password: document.getElementById('loginCode').value.trim(),
      });
      if (error) {
        errorEl.textContent = 'Invalid code.';
        errorEl.classList.remove('hidden');
        return;
      }
      showDashboard();
    });

    function setLoginTab(tab) {
      const isEmail = tab === 'email';
      document.getElementById('loginForm').classList.toggle('hidden', !isEmail);
      document.getElementById('codeLoginForm').classList.toggle('hidden', isEmail);
      document.getElementById('loginTabEmail').className = 'login-tab-btn flex-1 px-4 py-2 rounded-full text-xs font-semibold border transition ' +
        (isEmail ? 'bg-amber-600 border-amber-600 text-white' : 'bg-slate-900 border-slate-700 text-slate-300 hover:border-amber-500/40');
      document.getElementById('loginTabCode').className = 'login-tab-btn flex-1 px-4 py-2 rounded-full text-xs font-semibold border transition ' +
        (!isEmail ? 'bg-amber-600 border-amber-600 text-white' : 'bg-slate-900 border-slate-700 text-slate-300 hover:border-amber-500/40');
    }
    document.getElementById('loginTabEmail').addEventListener('click', () => setLoginTab('email'));
    document.getElementById('loginTabCode').addEventListener('click', () => setLoginTab('code'));
    setLoginTab('email');

    logoutBtn.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      showLogin();
    });

    function showDashboard() {
      loginView.classList.add('hidden');
      dashboardView.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');
      setMainTab('bookings');
      loadBookings();
    }
    function showLogin() {
      loginView.classList.remove('hidden');
      dashboardView.classList.add('hidden');
      logoutBtn.classList.add('hidden');
    }

    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) { showDashboard(); } else { showLogin(); }
    })();
  </script>
</body>
</html>
